# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: allowanceai-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: allowanceai-ai
    runtime: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: openai/gpt-4o-mini
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: ALLOWED_ORIGINS
        value: https://allowance-ai-eight.vercel.app,https://allowanceai-api.onrender.com
